name: Deploy

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preview:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check deploy environment
        run: |
          missing=0
          for name in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required secret: ${name}"
              missing=1
            fi
          done
          exit "$missing"

      - name: Upload backend preview
        run: |
          ALIAS="$(echo "${GITHUB_HEAD_REF}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g; s/^-*//; s/-*$//; s/--*/-/g' | cut -c1-40 | sed 's/-*$//')"
          pnpm --filter backend-cloudflare... build
          set +e
          OUTPUT="$(pnpm --filter backend-cloudflare exec wrangler versions upload --env preview --preview-alias "${ALIAS:-preview}" 2>&1)"
          STATUS="$?"
          set -e
          printf '%s\n' "$OUTPUT"
          if [ "$STATUS" -ne 0 ]; then
            if printf '%s\n' "$OUTPUT" | grep -q "This Worker does not exist"; then
              pnpm --filter backend-cloudflare exec wrangler deploy --env preview
              pnpm --filter backend-cloudflare exec wrangler versions upload --env preview --preview-alias "${ALIAS:-preview}"
            else
              exit "$STATUS"
            fi
          fi

  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check deploy environment
        run: |
          missing=0
          for name in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required secret: ${name}"
              missing=1
            fi
          done
          exit "$missing"

      - name: Deploy backend worker
        run: pnpm turbo run deploy --filter=backend-cloudflare
